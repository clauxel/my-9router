name = "nine-router-space"
main = "worker/standalone.js"
compatibility_date = "2026-05-08"
workers_dev = true
routes = [
  { pattern = "9router.space/*", zone_name = "9router.space" },
  { pattern = "www.9router.space/*", zone_name = "9router.space" }
]

[vars]
CREEM_API_BASE = "https://api.creem.io"
CREEM_ENV = "live"

[assets]
directory = "./dist"
binding = "SITE_ASSETS"
not_found_handling = "single-page-application"
run_worker_first = [
  "/*"
]
